name: Deploy App With cdk-ec2-service-module

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: your-app-repository
      GO_VERSION: '1.24'
      IMAGE_TAG: ${{ github.sha }}
      INFRA_DIRECTORY: infra

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::<account-id>:role/<consumer-deploy-role>

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Go tests
        working-directory: ./app
        run: go test ./...

      - name: Build Go binary
        working-directory: ./app
        run: go build ./...

      - name: Build Go application image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ./app

      - name: Push application image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Install infra dependencies
        working-directory: ${{ env.INFRA_DIRECTORY }}
        run: npm ci

      - name: Deploy consumer stack
        working-directory: ${{ env.INFRA_DIRECTORY }}
        run: |
          npx cdk deploy \
            --require-approval never \
            -c dockerImage=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
