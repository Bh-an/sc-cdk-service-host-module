name: Deploy Go App With sc-tf-service-host-module

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ap-south-1
      GO_VERSION: "1.24"
      IMAGE_TAG: sha-${{ github.sha }}
      IMAGE_REPOSITORY: ghcr.io/bh-an/sc-ec2-go-service
      INFRA_DIRECTORY: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::<account-id>:role/<consumer-deploy-role>

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests
        working-directory: ./app
        run: go test ./...

      - name: Build Go binary
        working-directory: ./app
        run: go build ./...

      - name: Build Go application image
        run: |
          docker build \
            -t ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ./app

      - name: Push application image
        run: |
          docker push ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIRECTORY }}
        run: terraform init

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIRECTORY }}
        run: |
          terraform apply -auto-approve \
            -var="docker_image=${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}"
