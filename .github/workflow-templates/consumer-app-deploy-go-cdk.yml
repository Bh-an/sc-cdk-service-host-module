name: Deploy Go App With cdk-service-host-module

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ap-south-1
      GO_VERSION: "1.25"
      IMAGE_TAG: sha-${{ github.sha }}
      IMAGE_REPOSITORY: ghcr.io/bh-an/sc-ec2-go-service
      INFRA_DIRECTORY: infra/cdk
      GOPRIVATE: github.com/Bh-an/*
      GONOSUMDB: github.com/Bh-an/*

    steps:
      - uses: actions/checkout@v4

      - name: Ensure shared repos token is configured
        run: test -n "${{ secrets.SHARED_REPOS_TOKEN }}"

      - name: Configure token-based access for shared repos
        run: git config --global url."https://x-access-token:${{ secrets.SHARED_REPOS_TOKEN }}@github.com/".insteadOf https://github.com/

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::<account-id>:role/<consumer-deploy-role>

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests
        working-directory: ./app
        run: go test ./...

      - name: Build Go binary
        working-directory: ./app
        run: go build ./...

      - name: Build Go application image
        run: |
          docker build \
            -t ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ./app

      - name: Push application image
        run: |
          docker push ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Build Go CDK app
        working-directory: ${{ env.INFRA_DIRECTORY }}
        run: go build .

      - name: Deploy consumer stack
        working-directory: ${{ env.INFRA_DIRECTORY }}
        env:
          DOCKER_IMAGE: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
        run: cdk deploy --require-approval never
