name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag points to main
        run: |
          git fetch origin main --depth=1
          git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run verify

      - name: Ensure package version matches tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Create source release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/js/*.tgz
            dist/go/cdkservicehostmodule/jsii/*.tgz

      - name: Ensure wrapper release token is configured
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: test -n "$GH_TOKEN"

      - name: Trigger wrapper release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          gh auth status
          gh workflow run release.yml \
            --repo Bh-an/sc-cdk-service-host-module-go \
            -f version="${GITHUB_REF_NAME#v}" \
            -f source_tag="${GITHUB_REF_NAME}"
